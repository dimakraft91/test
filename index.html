<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бегущая строка по траектории</title>
    <style>
    	.svgContainer {
    		background: url("bg.png") no-repeat;
    	}
    </style>
</head>
<body>

<div class="svgContainer" id="svgContainer">
    <svg width="100%" height="173">
        <path id="wavePath" d="M1441.5 78.5L1287 111L1185.5 117L1084 110.5L941 85L836.5 52.5L712.5 16L574 1H451.5L297.5 23L146 61.5L80 85.5L0.5 119.5" fill="transparent" />
    </svg>
</div>

<script>
    const path = document.getElementById('wavePath');
    const text = "HIGH COMISSIONS! HIGH COMISSIONS! HIGH COMISSIONS! ";
    const letters = text.split('');
    const pathLength = path.getTotalLength();
    const speed = 12; // Скорость анимации
    const offset = 30; // Смещение для каждого символа

    // Храним элементы <text> для каждой буквы
    const lettersGroup = [];

    // Создаем элементы <text> для каждой буквы
    letters.forEach((letter, index) => {
        const letterText = document.createElementNS("http://www.w3.org/2000/svg", "text");
        letterText.textContent = letter;
        letterText.setAttribute('font-size', '24');
        letterText.setAttribute('fill', 'black');
        // Установка начальных координат
        letterText.setAttribute('x', 0);
        letterText.setAttribute('y', 0);
        lettersGroup.push(letterText);
        document.querySelector('svg').appendChild(letterText);
    });

    function animate() {
        lettersGroup.forEach((letterText, index) => {
            // Прогресс для каждой буквы с учетом её позиции
            const progress = (performance.now() / speed - index * offset) % pathLength; // Изменено на '-' для правильного направления
            const point = path.getPointAtLength(progress);

            // Установка координат каждой буквы
            letterText.setAttribute('x', point.x);
            letterText.setAttribute('y', point.y);
        });

        requestAnimationFrame(animate);
    }

    // Запускаем анимацию
    animate();
</script>

</body>
</html>
